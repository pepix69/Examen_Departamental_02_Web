<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Detalle Venta')}"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:2px;">
                    <i class="fas fa-receipt mr-2" style="color:#e63946;"></i>DETALLE DE VENTA
                </h1>
            </div>
        </div>

        <div class="content">
            <div class="container-fluid">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="row">
                    <!-- Formulario agregar item -->
                    <div class="col-md-5">
                        <div class="card card-outline card-warning">
                            <div class="card-header">
                                <h3 class="card-title">
                                    Agregar producto/servicio a la Venta
                                    <strong th:text="${venta.id}"></strong>
                                    cliente <strong th:text="${venta.nombreCliente}"></strong>
                                </h3>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/ventas/agregar-item}" method="post">
                                    <input type="hidden" name="ventaId" th:value="${venta.id}">
                                    <div class="form-group">
                                        <label>Producto/Servicio</label>
                                        <select name="productoId" class="form-control" required>
                                            <option value="">-- Selecciona --</option>
                                            <option th:each="p : ${productos}"
                                                    th:value="${p.id}"
                                                    th:text="${p.nombre + ' - $' + p.precio}"></option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Cantidad</label>
                                        <input type="number" name="cantidad" class="form-control" min="1" value="1" required>
                                    </div>
                                    <div class="text-right">
                                        <a href="/ventas" class="btn btn-secondary mr-2">Cancelar</a>
                                        <button type="submit" class="btn btn-warning">
                                            <i class="fas fa-save mr-1"></i>Guardar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Items de la venta -->
                    <div class="col-md-7">
                        <div class="card card-outline card-danger">
                            <div class="card-header">
                                <h3 class="card-title">
                                    <i class="fas fa-list mr-2"></i>Items de la Venta — Cliente: <strong th:text="${venta.nombreCliente}"></strong>
                                </h3>
                                <div class="card-tools">
                                    <a th:href="@{/facturacion/generar/{id}(id=${venta.id})}"
                                       class="btn btn-sm btn-success">
                                        <i class="fas fa-file-invoice mr-1"></i>Generar Factura
                                    </a>
                                </div>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-sm table-hover">
                                    <thead class="thead-dark">
                                        <tr>
                                            <th>Producto/Servicio</th>
                                            <th>Cantidad</th>
                                            <th>Precio Unit.</th>
                                            <th>Subtotal</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item : ${venta.items}">
                                            <td th:text="${item.producto != null ? item.producto.nombre : 'N/A'}"></td>
                                            <td th:text="${item.cantidad}"></td>
                                            <td>$<span th:text="${item.precioUnitario}"></span></td>
                                            <td>$<span th:text="${item.subtotal}"></span></td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(venta.items)}">
                                            <td colspan="4" class="text-center text-muted">Sin items aún</td>
                                        </tr>
                                    </tbody>
                                    <tfoot>
                                        <tr class="table-danger">
                                            <td colspan="3"><strong>TOTAL</strong></td>
                                            <td><strong>$<span th:text="${venta.total}"></span></strong></td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="main-footer"><strong>GymSystem</strong> &copy; 2024</footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
