<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nueva Venta')}"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:2px;">
                    <i class="fas fa-cash-register mr-2" style="color:#e63946;"></i>NUEVA VENTA
                </h1>
            </div>
        </div>

        <div class="content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card card-outline card-danger">
                            <div class="card-header">
                                <h3 class="card-title">Nueva Venta</h3>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/ventas/guardar}" method="post" th:object="${venta}">
                                    <div class="form-group">
                                        <label>Nombre cliente: <span class="text-danger">*</span></label>
                                        <input type="text" th:field="*{nombreCliente}" class="form-control"
                                               placeholder="Ingrese un nombre" required>
                                    </div>
                                    <div class="form-group text-right">
                                        <a href="/ventas" class="btn btn-secondary mr-2">
                                            <i class="fas fa-times mr-1"></i>Cancelar
                                        </a>
                                        <button type="submit" class="btn" style="background:#28a745; color:#fff; font-weight:700;">
                                            <i class="fas fa-save mr-1"></i>Guardar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="main-footer"><strong>GymSystem</strong> &copy; 2024</footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
