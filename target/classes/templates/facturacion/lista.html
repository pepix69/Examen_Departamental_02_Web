<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Facturación')}"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:2px;">
                            <i class="fas fa-file-invoice-dollar mr-2" style="color:#e63946;"></i>FACTURACIÓN
                        </h1>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/inicio">Inicio</a></li>
                            <li class="breadcrumb-item active">Facturación</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="container-fluid">
                <div class="card card-outline card-danger">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-file-invoice mr-2"></i>Facturas</h3>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-striped">
                            <thead class="thead-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Total</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="v : ${ventas}">
                                    <td th:text="${v.id}"></td>
                                    <td th:text="${v.nombreCliente}"></td>
                                    <td><strong>$<span th:text="${v.total}"></span></strong></td>
                                    <td>
                                        <a th:href="@{/facturacion/generar/{id}(id=${v.id})}"
                                           class="btn btn-sm btn-warning">
                                            <i class="fas fa-file-invoice mr-1"></i>Generar
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(ventas)}">
                                    <td colspan="4" class="text-center text-muted py-4">No hay facturas disponibles</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="main-footer"><strong>GymSystem</strong> &copy; 2024</footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
