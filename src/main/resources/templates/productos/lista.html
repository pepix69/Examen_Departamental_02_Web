<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Productos y Servicios')}"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:2px;">
                            <i class="fas fa-box mr-2" style="color:#e63946;"></i>PRODUCTOS Y SERVICIOS
                        </h1>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/inicio">Inicio</a></li>
                            <li class="breadcrumb-item active">Productos</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="container-fluid">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="card card-outline card-danger">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-list mr-2"></i>Lista de Productos y Servicios</h3>
                        <div class="card-tools">
                            <a href="/productos/nuevo" class="btn btn-sm" style="background:#e63946; color:#fff;">
                                <i class="fas fa-plus mr-1"></i>Nuevo
                            </a>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-striped">
                            <thead class="thead-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Tipo</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${productos}">
                                    <td th:text="${p.id}"></td>
                                    <td th:text="${p.nombre}"></td>
                                    <td>
                                        <span th:if="${p.tipo == 'SERVICIO'}" class="badge badge-primary">Servicio</span>
                                        <span th:if="${p.tipo == 'PRODUCTO'}" class="badge badge-warning">Producto</span>
                                    </td>
                                    <td>$<span th:text="${p.precio}"></span></td>
                                    <td th:text="${p.stock}"></td>
                                    <td>
                                        <span th:if="${p.activo}" class="badge badge-success">Activo</span>
                                        <span th:unless="${p.activo}" class="badge badge-secondary">Inactivo</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/productos/editar/{id}(id=${p.id})}" class="btn btn-xs btn-warning mr-1">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a th:href="@{/productos/eliminar/{id}(id=${p.id})}"
                                           class="btn btn-xs btn-danger"
                                           onclick="return confirm('¿Eliminar este producto?')">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(productos)}">
                                    <td colspan="7" class="text-center text-muted py-4">
                                        <i class="fas fa-box-open fa-2x mb-2 d-block"></i>No hay productos registrados
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="main-footer"><strong>GymSystem</strong> &copy; 2024</footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
