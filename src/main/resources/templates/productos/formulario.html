<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Producto')}"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:2px;">
                    <i class="fas fa-box mr-2" style="color:#e63946;"></i>
                    <span th:if="${producto.id == null}">NUEVO PRODUCTO/SERVICIO</span>
                    <span th:unless="${producto.id == null}">EDITAR PRODUCTO/SERVICIO</span>
                </h1>
            </div>
        </div>

        <div class="content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card card-outline card-danger">
                            <div class="card-header">
                                <h3 class="card-title">
                                    <span th:if="${producto.id == null}">Nuevo Producto/Servicio</span>
                                    <span th:unless="${producto.id == null}">Editar: <span th:text="${producto.nombre}"></span></span>
                                </h3>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/productos/guardar}" method="post" th:object="${producto}">
                                    <input type="hidden" th:field="*{id}">
                                    <input type="hidden" th:field="*{activo}" value="true">

                                    <div class="form-group">
                                        <label>Nombre <span class="text-danger">*</span></label>
                                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Membresía Mensual" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Descripción</label>
                                        <textarea th:field="*{descripcion}" class="form-control" rows="3" placeholder="Descripción del producto o servicio..."></textarea>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group col-md-4">
                                            <label>Precio ($) <span class="text-danger">*</span></label>
                                            <input type="number" th:field="*{precio}" class="form-control" step="0.01" min="0" required>
                                        </div>
                                        <div class="form-group col-md-4">
                                            <label>Tipo <span class="text-danger">*</span></label>
                                            <select th:field="*{tipo}" class="form-control" required>
                                                <option value="">-- Selecciona --</option>
                                                <option value="SERVICIO">Servicio</option>
                                                <option value="PRODUCTO">Producto</option>
                                            </select>
                                        </div>
                                        <div class="form-group col-md-4">
                                            <label>Stock</label>
                                            <input type="number" th:field="*{stock}" class="form-control" min="0" value="0">
                                        </div>
                                    </div>

                                    <div class="form-group text-right">
                                        <a href="/productos" class="btn btn-secondary mr-2">
                                            <i class="fas fa-times mr-1"></i>Cancelar
                                        </a>
                                        <button type="submit" class="btn" style="background:#e63946; color:#fff;">
                                            <i class="fas fa-save mr-1"></i>Guardar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="main-footer"><strong>GymSystem</strong> &copy; 2024</footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
