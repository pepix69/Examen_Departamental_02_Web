<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="hold-transition login-page" style="background: #1d1d2e;">
<style>
    .login-box-body { border-radius: 12px; border-top: 4px solid #e63946; }
    .login-logo span { color: #e63946; }
    .login-logo { color: #fff; }
    .btn-block.btn-primary { background: #e63946; border-color: #e63946; font-weight: 700; letter-spacing: 1px; }
    .btn-block.btn-primary:hover { background: #c1121f; }
    .login-page { background: linear-gradient(135deg, #1d1d2e 0%, #2d2d44 100%); }
    .gym-hero { color: #fff; text-align: center; margin-bottom: 10px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 4px; font-size: 3.5rem; }
    .gym-hero span { color: #e63946; }
    .gym-sub { color: #aaa; text-align: center; font-size: 0.85rem; letter-spacing: 2px; margin-bottom: 20px; }
</style>
<div class="login-box" style="margin-top: 60px;">
    <div class="gym-hero">GYM<span>SYSTEM</span></div>
    <div class="gym-sub">GESTIÓN PROFESIONAL DE GIMNASIO</div>
    <div class="card">
        <div class="card-body login-card-body login-box-body">
            <p class="login-box-msg" style="font-weight: 600; color: #333;">Inicia sesión</p>

            <div th:if="${error}" class="alert alert-danger py-2 small">
                <i class="fas fa-exclamation-triangle mr-1"></i> <span th:text="${error}"></span>
            </div>
            <div th:if="${logout}" class="alert alert-success py-2 small">
                <i class="fas fa-check-circle mr-1"></i> <span th:text="${logout}"></span>
            </div>

            <form th:action="@{/auth/login}" method="post">
                <div class="input-group mb-3">
                    <input type="email" name="username" class="form-control" placeholder="Correo electrónico" required>
                    <div class="input-group-append">
                        <div class="input-group-text"><span class="fas fa-envelope"></span></div>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                    <div class="input-group-append">
                        <div class="input-group-text"><span class="fas fa-lock"></span></div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-7">
                        <div class="icheck-primary">
                            <input type="checkbox" id="remember" name="remember-me">
                            <label for="remember">Recordarme</label>
                        </div>
                    </div>
                    <div class="col-5">
                        <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
                    </div>
                </div>
            </form>
            <p class="mb-1 mt-3">
                <a href="/auth/recuperar" style="color: #e63946;">Olvidé mi contraseña</a>
            </p>
            <p class="mb-0">
                <a href="/auth/registro" class="text-center" style="color: #666;">Registrarme</a>
            </p>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
